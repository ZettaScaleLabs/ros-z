name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-msgs:
    name: Build ros-z-msgs-py wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build
        working-directory: crates/ros-z-msgs/python

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros-z-msgs-py-dist
          path: crates/ros-z-msgs/python/dist/*

  build-wheels:
    name: Build ros-z-py (${{ matrix.distro }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            distro: jazzy
            extra_args: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            distro: humble
            extra_args: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            distro: jazzy
            # --zig uses cargo-zigbuild for cross-compilation; handles ring's C assembly
            extra_args: "--zig"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            distro: humble
            extra_args: "--zig"
          - target: aarch64-apple-darwin
            os: macos-latest
            distro: jazzy
            extra_args: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            distro: humble
            extra_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --features pyo3/extension-module,${{ matrix.distro }}
            --no-default-features
            --out dist
            ${{ matrix.extra_args }}
          working-directory: crates/ros-z-py
          manylinux: auto

      - name: Rename wheel to include distro suffix
        shell: bash
        run: |
          for whl in crates/ros-z-py/dist/*.whl; do
            base="${whl%.whl}"
            # sudo needed: manylinux container builds as root, wheel is root-owned
            sudo mv "$whl" "${base}-${{ matrix.distro }}.whl"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros-z-py-${{ matrix.distro }}-${{ matrix.target }}
          path: crates/ros-z-py/dist/*

  release:
    name: Create GitHub Release
    needs: [build-msgs, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download ros-z-msgs-py artifacts
        uses: actions/download-artifact@v4
        with:
          name: ros-z-msgs-py-dist
          path: dist/

      - name: Download ros-z-py wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ros-z-py-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/**
