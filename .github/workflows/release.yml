name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-msgs:
    name: Build ros-z-msgs-py wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Python message types
        run: cargo build -p ros-z-msgs --features python_registry -j4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build
        working-directory: crates/ros-z-msgs/python

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros-z-msgs-py-dist
          path: crates/ros-z-msgs/python/dist/*

  build-wheels:
    name: Build ros-z-py (${{ matrix.distro }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            distro: jazzy
            extra_args: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            distro: humble
            extra_args: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            distro: jazzy
            # --zig uses cargo-zigbuild for cross-compilation; handles ring's C assembly
            extra_args: "--zig"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            distro: humble
            extra_args: "--zig"
          - target: aarch64-apple-darwin
            os: macos-latest
            distro: jazzy
            extra_args: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            distro: humble
            extra_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Prepare macOS build environment
        if: matrix.os == 'macos-latest'
        run: |
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --features pyo3/extension-module,${{ matrix.distro }}
            --no-default-features
            --out dist
            ${{ matrix.extra_args }}
          working-directory: crates/ros-z-py
          manylinux: auto

      - name: Rename wheel to include distro as build tag
        shell: bash
        run: |
          # Insert the distro as the PEP 427 build tag (field 3): 0{distro}
          # e.g. ros_z_py-0.1.0-cp311-... → ros_z_py-0.1.0-0jazzy-cp311-...
          # Build tags must start with a digit. The distribution name is unchanged
          # so pip can match it against the .dist-info directory inside the wheel.
          # sudo needed: manylinux container builds as root, wheel is root-owned.
          for whl in crates/ros-z-py/dist/*.whl; do
            dir=$(dirname "$whl")
            base=$(basename "${whl%.whl}")
            name="${base%%-*}"
            rest="${base#*-}"
            version="${rest%%-*}"
            tags="${rest#*-}"
            sudo mv "$whl" "$dir/${name}-${version}-0${{ matrix.distro }}-${tags}.whl"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros-z-py-${{ matrix.distro }}-${{ matrix.target }}
          path: crates/ros-z-py/dist/*

  build-binaries:
    name: Build ${{ matrix.bin }} (${{ matrix.label }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ros-z-console — distro-agnostic, one binary per platform
          - bin: ros-z-console
            package: ros-z-console
            features: ""
            artifact: bin-console-x86_64-linux
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - bin: ros-z-console
            package: ros-z-console
            features: ""
            artifact: bin-console-aarch64-linux
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - bin: ros-z-console
            package: ros-z-console
            features: ""
            artifact: bin-console-aarch64-macos
            target: aarch64-apple-darwin
            os: macos-latest
          # ros-z-bridge — one binary per distro per platform
          - bin: ros-z-bridge
            package: ros-z-bridge
            features: "jazzy"
            artifact: bin-bridge-jazzy-x86_64-linux
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - bin: ros-z-bridge
            package: ros-z-bridge
            features: "humble"
            artifact: bin-bridge-humble-x86_64-linux
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - bin: ros-z-bridge
            package: ros-z-bridge
            features: "jazzy"
            artifact: bin-bridge-jazzy-aarch64-linux
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - bin: ros-z-bridge
            package: ros-z-bridge
            features: "humble"
            artifact: bin-bridge-humble-aarch64-linux
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - bin: ros-z-bridge
            package: ros-z-bridge
            features: "jazzy"
            artifact: bin-bridge-jazzy-aarch64-macos
            target: aarch64-apple-darwin
            os: macos-latest
          - bin: ros-z-bridge
            package: ros-z-bridge
            features: "humble"
            artifact: bin-bridge-humble-aarch64-macos
            target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target (Linux cross-compile only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          pip install ziglang
      - name: Install cargo-zigbuild (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build binary (aarch64 Linux via zigbuild)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: >-
          cargo zigbuild --release
          --bin ${{ matrix.bin }}
          --package ${{ matrix.package }}
          ${{ matrix.features != '' && format('--features {0} --no-default-features', matrix.features) || '' }}
          --target ${{ matrix.target }}

      - name: Build binary (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          cargo build --release \
            --bin ${{ matrix.bin }} \
            --package ${{ matrix.package }} \
            ${{ matrix.features != '' && format('--features {0} --no-default-features', matrix.features) || '' }} \
            --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p bin-dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" \
             "bin-dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin-dist/*

  build-go-libs:
    name: Build libros_z (${{ matrix.distro }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            distro: jazzy
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            distro: humble
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            distro: jazzy
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            distro: humble
          - target: aarch64-apple-darwin
            os: macos-latest
            distro: jazzy
          - target: aarch64-apple-darwin
            os: macos-latest
            distro: humble

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target (Linux cross-compile only)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
        run: |
          pip install ziglang
      - name: Install cargo-zigbuild (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build libros_z (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu' || matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          cargo build --release \
            --features ffi,${{ matrix.distro }} \
            --no-default-features \
            --target ${{ matrix.target }} \
            -p ros-z

      - name: Build libros_z (aarch64 Linux via zigbuild)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
        run: >-
          cargo zigbuild --release
          --features ffi,${{ matrix.distro }}
          --no-default-features
          --target ${{ matrix.target }}
          -p ros-z

      - name: Package library
        shell: bash
        run: |
          mkdir -p go-dist
          src="target/${{ matrix.target }}/release"
          name="libros_z-${{ matrix.distro }}-${{ matrix.target }}"
          if [ -f "$src/libros_z.a" ]; then
            cp "$src/libros_z.a" "go-dist/${name}.a"
          fi
          if [ -f "$src/libros_z.dylib" ]; then
            cp "$src/libros_z.dylib" "go-dist/${name}.dylib"
          fi
          if [ -f "$src/libros_z.so" ]; then
            cp "$src/libros_z.so" "go-dist/${name}.so"
          fi
          cp crates/ros-z-go/rosz/ros_z_ffi.h "go-dist/ros_z_ffi.h"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libros_z-${{ matrix.distro }}-${{ matrix.target }}
          path: go-dist/*

  smoke-test-python:
    name: Smoke test Python wheel
    needs: [build-msgs, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download ros-z-msgs-py
        uses: actions/download-artifact@v4
        with:
          name: ros-z-msgs-py-dist
          path: dist/

      - name: Download ros-z-py wheel (jazzy, x86_64)
        uses: actions/download-artifact@v4
        with:
          name: ros-z-py-jazzy-x86_64-unknown-linux-gnu
          path: dist/

      - name: Install wheels into venv
        run: |
          python -m venv .venv
          # Install msgs first so it is fully initialized before ros_z_py imports it
          .venv/bin/pip install dist/ros_z_msgs_py-*.whl
          .venv/bin/pip install "dist/ros_z_py-"*0jazzy*.whl

      - name: Import test
        run: .venv/bin/python -c "import ros_z_py; print('ros_z_py import ok')"

  smoke-test-binaries:
    name: Smoke test binaries
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download console binary (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: bin-console-x86_64-linux
          path: dist/

      - name: Download bridge binary (jazzy, x86_64)
        uses: actions/download-artifact@v4
        with:
          name: bin-bridge-jazzy-x86_64-linux
          path: dist/

      - name: Run --help
        run: |
          chmod +x dist/bin-console-x86_64-linux dist/bin-bridge-jazzy-x86_64-linux
          dist/bin-console-x86_64-linux --help
          dist/bin-bridge-jazzy-x86_64-linux --help

      - name: Runtime startup check (no crash without router)
        run: |
          # Run bridge for 3 s without a router; SIGTERM or connection-refused is
          # expected. A crash (SIGSEGV=139, SIGABRT=134) is not.
          dist/bin-bridge-jazzy-x86_64-linux &
          BID=$!
          sleep 3
          kill $BID 2>/dev/null || true   # ignore: process may have exited already
          EXIT=0; wait $BID 2>/dev/null || EXIT=$?
          # SIGTERM = 143; SIGSEGV = 139; SIGABRT = 134
          if [ "$EXIT" -eq 139 ] || [ "$EXIT" -eq 134 ]; then
            echo "FAIL: bridge crashed on startup (exit $EXIT)"
            exit 1
          fi
          echo "bridge runtime ok (exit $EXIT — expected SIGTERM/connection error)"

  smoke-test-go:
    name: Smoke test Go library
    needs: [build-go-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download libros_z (jazzy, x86_64)
        uses: actions/download-artifact@v4
        with:
          name: libros_z-jazzy-x86_64-unknown-linux-gnu
          path: dist/

      - name: Verify archive and header
        run: |
          ar t dist/libros_z-jazzy-x86_64-unknown-linux-gnu.a | head -5
          test -f dist/ros_z_ffi.h
          echo "Go library artifact ok"

      - name: Place library for CGO build
        run: |
          mkdir -p target/release
          cp dist/libros_z-jazzy-x86_64-unknown-linux-gnu.a target/release/libros_z.a

      - name: Build Go package (CGO link test)
        working-directory: crates/ros-z-go
        run: go build ./rosz/...

  release:
    name: Create GitHub Release
    needs: [smoke-test-python, smoke-test-binaries, smoke-test-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download ros-z-msgs-py artifacts
        uses: actions/download-artifact@v4
        with:
          name: ros-z-msgs-py-dist
          path: dist/

      - name: Download ros-z-py wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ros-z-py-*
          path: dist/
          merge-multiple: true

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist/
          merge-multiple: true

      - name: Download libros_z artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libros_z-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/**

  smoke-test-release-install:
    name: Smoke test install from release URL
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m venv .venv
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          mkdir release-dist
          gh release download "$TAG" --repo "$REPO" \
            --pattern "ros_z_msgs_py-*.whl" \
            --pattern "*0jazzy*x86_64*linux*.whl" \
            --dir release-dist/
          .venv/bin/pip install release-dist/ros_z_msgs_py-*.whl
          .venv/bin/pip install release-dist/*0jazzy*x86_64*linux*.whl

      - name: Import test
        run: .venv/bin/python -c "import ros_z_py; print('ros_z_py install-from-release ok')"
