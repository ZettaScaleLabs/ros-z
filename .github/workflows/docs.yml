name: Docs

on:
  push:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '**.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '**.md'
      - '.github/workflows/docs.yml'

jobs:
  build_doc:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Build MkDocs
        run: |
          sed -i 's|^site_url:.*|site_url: /|' mkdocs.yml
          nix develop '.#pureRust-ci' -c mkdocs build --strict
        env:
          NIX_ACCEPT_FLAKE_CONFIG: 1

      - name: Check example documentation coverage
        run: |
          nix develop '.#pureRust-ci' -c nu scripts/check-example-coverage.nu
        env:
          NIX_ACCEPT_FLAKE_CONFIG: 1

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --root-dir ${{ github.workspace }}/site
            --exclude-path ${{ github.workspace }}/site/overrides
            --config .lychee.toml
            ./site
          fail: true

  publish_doc:
    name: Publish to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build_doc
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Build MkDocs
        run: |
          nix develop '.#pureRust-ci' -c mkdocs build --strict
        env:
          NIX_ACCEPT_FLAKE_CONFIG: 1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          clean_exclude: pr-preview/
          force_orphan: false
